---
# Variables globales du VPS
# Remplacez ces valeurs avant de lancer le playbook

# ─── Domaine principal ───────────────────────────────────────────────────────
domain: "your-domain.com"

# ─── Traefik ─────────────────────────────────────────────────────────────────
# Email pour les certificats Let's Encrypt
# Mot de passe u1J*ft&4Rk$&1TT!
traefik_acme_email: "admin@your-domain.com"
# Identifiants du dashboard Traefik (générer avec: htpasswd -nb user password)
traefik_dashboard_users: "admin:$$apr1$$..."

# ─── PostgreSQL ───────────────────────────────────────────────────────────────
postgres_user: "pguser"
postgres_password: "changeme"
postgres_db: "appdb"

# ─── MinIO ────────────────────────────────────────────────────────────────────
minio_root_user: "minioadmin"
minio_root_password: "changeme"

# ─── MinerU (extraction PDF → MD/JSON) ────────────────────────────────────────
# Optionnel : le rôle a déjà des valeurs par défaut (roles/mineru/defaults/main.yml).
# Décommenter pour surcharger.
# mineru_version: "3.4.0"          # doit matcher une version publiée sur PyPI
# mineru_port: 8004               # bind 127.0.0.1 uniquement (debug / tunnel SSH)
# mineru_model_source: "huggingface"  # ou "modelscope" si HF lent/bloqué
# mineru_mem_limit: ""            # ex: "8g" ; vide = pas de limite
