---
# ─── Middleware "upload-limit" (provider file) ────────────────────────────────
# Plafond de taille du corps de requête, à attacher aux routeurs qui reçoivent
# des uploads (ex: python.{{ domain }}). Le service Python accepte
# MAX_UPLOAD_MB=100 ; on laisse une marge pour l'enrobage multipart.
# Au-delà : Traefik répond 413 Request Entity Too Large.
traefik_upload_limit_max_body_bytes: 125829120  # 120 MiB (100 Mo + marge)

# Au-delà de ce seuil, le corps est bufferisé sur disque plutôt qu'en RAM.
traefik_upload_limit_mem_body_bytes: 10485760   # 10 MiB
